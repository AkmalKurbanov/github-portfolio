    <style>
      .logo {
        margin-bottom: 25px
      }
      .main {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      position: relative;
      background-size: cover;
      padding: 30px 0;
      position: relative;
      background-position: right top;
      }
      .main:before {
      position: absolute;
      content: '';
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.7);
      }
      
      .wrap{
        width: 225px 
      }
      
      .list ul{
        padding: 0
      }
      .list ul li{
        position: relative;
        padding-left: 20px;
        list-style: none;
        margin-top: 5px
      }
      .list ul li:before{
        position: absolute;
        content: '';
        width: 12px;
        height: 12px;
        border: 1px solid white;
        border-radius: 100%;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        transition: all .3s;
      }
      .list ul li a{
        color: white;
        text-decoration: none;
        font-size: 22px;
        transition: all .3s;
      }
      .list ul li:hover a{
        color: #9747ff;
      }
      .list ul li:hover:before{
        border-color: #9747ff;
      }
      
    </style>
