<body>

  <style>
  .main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      position: relative;
      background-size: cover;
      padding: 30px 0;
      position: relative;
    }

    .main:before {
      position: absolute;
      content: '';
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background-color: rgba(0, 0, 0, 0.7);
    }

    .logo {
      max-width: 400px;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .logo svg {
      width: 100%;
    }

    .logo-title {
      color: #ffffff;
      text-align: center;
      display: block;
      margin-top: 10px;
      font-size: 25px;
      font-family: 'Montserrat';
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 30px;
      position: relative;
      z-index: 1;
    }

    .list {
      max-width: 1140px;
      width: 100%;
      padding: 20px 15px 0px;
    }


    img {
      width: 100%;
      max-width: 100%;
    }

    ul {
      margin: 0 auto;
      padding: 0;
      width: 100%;
      max-width: 360px;
    }

    li {
      list-style-type: none;
    }

    ul li a {
      text-decoration: none;
      text-transform: uppercase;
      color: #fff;
      font-size: 17px;
      line-height: 1.8;
      position: relative;
      padding-left: 25px;
      transition: all .3s

    }

    ul li a::before {
      content: "";
      position: absolute;
      left: 0;
      width: 15px;
      height: 15px;
      border-radius: 100%;
      border: 1px solid #fff;
      top: 50%;
      transform: translateY(-50%);
      transition: all .3s
    }



    ul li a:hover {
      color: #F8A5D5;
      text-decoration: none;
    }

    ul li a:hover:before {
      border: 1px solid #C0FF72;
    }


    @media (max-width:1199.98px) {
      ul li a {
        font-size: 15px
      }

      ul li a:before {
        width: 12px;
        height: 12px;
        left: 5px;
      }
    }

    @media (max-width:991.98px) {
      li {
        list-style-type: none;
        flex-basis: 60%;
      }

      li:nth-child(2n) {
        padding-left: 0;
        flex-basis: 40%;
      }

      ul li a {
        font-size: 14px;
        padding-left: 10px
      }

      ul li a:before {
        width: 10px;
        height: 10px;
        left: -8px
      }
    }

    @media (max-width:767.98px) {
      .logo {
        margin-bottom: 20px;
      }
      ul li a {
        color: #fff
      }
    }

    @media (max-width:575.98px) {
      .list {
        padding: 5px 0 0 30px;
      }

      li {
        flex-basis: 100%;
        padding: 0;
      }

      li:nth-child(2n) {
        padding-left: 0;
        flex-basis: 100%;
      }

      ul li a {
        font-size: 13px;
        font-weight: 500;
        padding-left: 7px;
      }

      .logo {
        margin-bottom: 0;
      }
    }
  </style>
